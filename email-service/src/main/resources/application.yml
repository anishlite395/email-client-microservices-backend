server:
  port: 8083

spring:
  application:
    name: email-service
  
  jpa:
   hibernate:
     ddl-auto: update

  datasource:
    url: jdbc:mysql://localhost:3306/email_service
    username: root
    password: root123@

  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: email-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.email.service.dto,com.email.auth.entity

logging:
  file:
    name: C:/logs/email-service.log
  level:
    root: INFO
    com.email.service: DEBUG

hmail:
  admin:
    username: ${HMAIL_ADMIN_USERNAME}
    password: ${HMAIL_ADMIN_PASSWORD}