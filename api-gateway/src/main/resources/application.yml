server:
 port: 8080

spring:
 application:
  name: api-gateway

 cloud:
  gateway:
    routes:
      - id: auth-service
        uri: http://localhost:8081
        predicates:
          - Path=/auth/**

      - id: config-service
        uri: http://localhost:8082
        predicates:
          - Path=/config/**

      - id: email-service
        uri: http://localhost:8083
        predicates:
          - Path=/email/**

      - id: inbox-service
        uri: http://localhost:8084
        predicates:
          - Path=/inbox/**

      - id: drafts-service
        uri: http://localhost:8085
        predicates:
          - Path=/drafts/**

      - id: sent-service
        uri: http://localhost:8086
        predicates:
          - Path=/sent/**